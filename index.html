<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디지털 포렌식 & 네트워크 시험 대비 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d1117;--surface:#161b22;--card:#1c2230;--border:#30363d;
    --accent:#58a6ff;--accent2:#f78166;--accent3:#56d364;--text:#e6edf3;
    --text-muted:#8b949e;--correct:#1a4731;--correct-border:#56d364;
    --wrong:#4a1c1c;--wrong-border:#f85149;--yellow:#e3b341;
    --hard:#c678dd;--hard-bg:rgba(198,120,221,0.12);--hard-border:rgba(198,120,221,0.35);
    --expert:#f0b429;--expert-bg:rgba(240,180,41,0.12);--expert-border:rgba(240,180,41,0.4);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}

  /* ── 시작 화면 ── */
  #start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;position:relative;overflow:hidden;}
  #start-screen::before{content:'';position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(88,166,255,0.12) 0%,transparent 70%);pointer-events:none;}
  #start-screen::after{content:'';position:absolute;bottom:-150px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(247,129,102,0.10) 0%,transparent 70%);pointer-events:none;}
  .start-badge{background:rgba(88,166,255,0.15);border:1px solid rgba(88,166,255,0.35);color:var(--accent);font-size:0.78rem;font-weight:700;letter-spacing:0.12em;padding:0.35rem 1rem;border-radius:100px;margin-bottom:1.5rem;text-transform:uppercase;}
  .start-title{font-family:'Black Han Sans',sans-serif;font-size:clamp(2rem,5vw,3.5rem);text-align:center;line-height:1.2;margin-bottom:0.8rem;background:linear-gradient(135deg,#e6edf3 0%,#58a6ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .start-sub{color:var(--text-muted);font-size:0.95rem;text-align:center;margin-bottom:2.5rem;line-height:1.7;}
  .info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;width:100%;max-width:480px;}
  .info-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center;}
  .info-card .num{font-size:1.8rem;font-weight:900;color:var(--accent);display:block;}
  .info-card .lbl{font-size:0.75rem;color:var(--text-muted);margin-top:0.2rem;}
  .diff-select-label{font-size:0.85rem;color:var(--text-muted);margin-bottom:0.8rem;text-align:center;}
  .diff-buttons{display:flex;gap:0.8rem;margin-bottom:2rem;width:100%;max-width:540px;flex-wrap:wrap;justify-content:center;}
  .diff-btn{flex:1;min-width:140px;padding:0.85rem 0.8rem;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text-muted);font-family:'Noto Sans KR',sans-serif;font-size:0.92rem;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:0.25rem;}
  .diff-btn .diff-icon{font-size:1.4rem;}.diff-btn .diff-name{font-size:0.95rem;}.diff-btn .diff-desc{font-size:0.68rem;font-weight:400;opacity:0.7;}
  .diff-btn.selected-normal{border-color:var(--accent);background:rgba(88,166,255,0.1);color:var(--accent);}
  .diff-btn.selected-hard{border-color:var(--hard);background:var(--hard-bg);color:var(--hard);}
  .diff-btn.selected-expert{border-color:var(--expert);background:var(--expert-bg);color:var(--expert);}
  .btn-start{background:linear-gradient(135deg,#58a6ff,#388bfd);color:#fff;border:none;padding:1rem 3rem;font-size:1.1rem;font-weight:700;font-family:'Noto Sans KR',sans-serif;border-radius:12px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 4px 24px rgba(88,166,255,0.3);}
  .btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(88,166,255,0.45);}
  .btn-start.hard-mode{background:linear-gradient(135deg,#c678dd,#9b59b6);box-shadow:0 4px 24px rgba(198,120,221,0.3);}
  .btn-start.expert-mode{background:linear-gradient(135deg,#f0b429,#d97706);box-shadow:0 4px 24px rgba(240,180,41,0.3);}

  /* ── 퀴즈 화면 ── */
  #quiz-screen{display:none;max-width:720px;margin:0 auto;padding:2rem 1.5rem 5rem;}
  .quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
  .quiz-counter{font-size:0.85rem;color:var(--text-muted);font-weight:700;letter-spacing:0.05em;}
  .quiz-counter span{color:var(--accent);font-size:1.1rem;}
  .score-badge{background:rgba(86,211,100,0.15);border:1px solid rgba(86,211,100,0.3);color:var(--accent3);font-size:0.8rem;font-weight:700;padding:0.3rem 0.8rem;border-radius:100px;}
  .progress-bar-wrap{height:4px;background:var(--border);border-radius:99px;margin-bottom:2rem;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,#58a6ff,#56d364);border-radius:99px;transition:width 0.4s ease;}
  .progress-bar-fill.hard-fill{background:linear-gradient(90deg,#c678dd,#f78166);}
  .progress-bar-fill.expert-fill{background:linear-gradient(90deg,#f0b429,#f85149);}
  .question-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.8rem;margin-bottom:1.4rem;position:relative;overflow:hidden;}
  .question-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#58a6ff,#388bfd);}
  .question-card.hard-card::before{background:linear-gradient(90deg,#c678dd,#f78166);}
  .question-card.expert-card::before{background:linear-gradient(90deg,#f0b429,#f85149);}
  .question-type{font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:0.8rem;display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;}
  .question-type::before{content:'';display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%;}
  .question-card.hard-card .question-type{color:var(--hard);}
  .question-card.hard-card .question-type::before{background:var(--hard);}
  .question-card.expert-card .question-type{color:var(--expert);}
  .question-card.expert-card .question-type::before{background:var(--expert);}
  .hard-badge-inline{background:var(--hard-bg);border:1px solid var(--hard-border);color:var(--hard);font-size:0.68rem;padding:0.1rem 0.5rem;border-radius:100px;font-weight:700;}
  .expert-badge-inline{background:var(--expert-bg);border:1px solid var(--expert-border);color:var(--expert);font-size:0.68rem;padding:0.1rem 0.5rem;border-radius:100px;font-weight:700;}
  .fmt-tag{background:rgba(88,166,255,0.12);border:1px solid rgba(88,166,255,0.25);color:var(--accent);font-size:0.68rem;padding:0.1rem 0.5rem;border-radius:100px;font-weight:700;}
  .question-card.hard-card .fmt-tag{background:var(--hard-bg);border-color:var(--hard-border);color:var(--hard);}
  .question-card.expert-card .fmt-tag{background:var(--expert-bg);border-color:var(--expert-border);color:var(--expert);}
  .question-text{font-size:1.05rem;font-weight:500;line-height:1.7;color:var(--text);margin-top:0.3rem;}

  /* hq 컴포넌트 */
  .hq-box{background:rgba(255,255,255,0.03);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;margin:10px 0;font-size:0.88rem;color:var(--text);line-height:1.8;}
  .hq-box-title{font-size:0.72rem;font-weight:700;color:var(--text-muted);margin-bottom:6px;letter-spacing:0.05em;text-transform:uppercase;}
  .hq-underline{display:inline;border-bottom:2px solid #f85149;color:var(--text);font-weight:600;}
  .hq-arrow-flow{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:10px 0;font-size:0.85rem;}
  .hq-flow-box{background:rgba(255,255,255,0.05);border:0.5px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);white-space:nowrap;font-size:0.82rem;line-height:1.4;text-align:center;}
  .hq-flow-blank{background:rgba(198,120,221,0.12);border:0.5px solid rgba(198,120,221,0.4);border-radius:8px;padding:6px 14px;color:var(--hard);font-weight:700;white-space:nowrap;font-size:0.82rem;}
  .hq-flow-blank-expert{background:var(--expert-bg);border:0.5px solid var(--expert-border);border-radius:8px;padding:6px 14px;color:var(--expert);font-weight:700;white-space:nowrap;font-size:0.82rem;}
  .hq-flow-arrow{color:var(--text-muted);font-size:1rem;}
  .hq-two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
  .hq-col-card{background:rgba(255,255,255,0.03);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:0.82rem;color:var(--text);line-height:1.7;}
  .hq-col-label{font-size:0.7rem;font-weight:700;color:var(--text-muted);margin-bottom:4px;}
  .hq-table-wrap{overflow-x:auto;margin:10px 0;}
  .hq-table{width:100%;border-collapse:collapse;font-size:0.82rem;}
  .hq-table th{background:rgba(255,255,255,0.04);color:var(--text-muted);font-weight:600;padding:7px 10px;text-align:left;border-bottom:0.5px solid var(--border);}
  .hq-table td{padding:7px 10px;border-bottom:0.5px solid rgba(255,255,255,0.05);color:var(--text);vertical-align:top;line-height:1.5;}
  .hex-tag{font-family:monospace;background:rgba(88,166,255,0.1);border:1px solid rgba(88,166,255,0.2);color:#79c0ff;padding:2px 6px;border-radius:4px;font-size:0.82rem;letter-spacing:0.05em;}

  /* 선택지 */
  .choices{display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1.4rem;}
  .choice-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:0.9rem 1.2rem;border-radius:10px;text-align:left;font-size:0.93rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.15s;display:flex;align-items:flex-start;gap:0.8rem;line-height:1.5;}
  .choice-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(88,166,255,0.08);transform:translateX(3px);}
  .hard-mode-active .choice-btn:hover:not(:disabled){border-color:var(--hard);background:var(--hard-bg);}
  .expert-mode-active .choice-btn:hover:not(:disabled){border-color:var(--expert);background:var(--expert-bg);}
  .choice-btn .choice-num{min-width:24px;height:24px;border-radius:6px;background:var(--border);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:700;flex-shrink:0;margin-top:1px;transition:all 0.15s;}
  .choice-btn:hover:not(:disabled) .choice-num{background:var(--accent);color:#fff;}
  .hard-mode-active .choice-btn:hover:not(:disabled) .choice-num{background:var(--hard);color:#fff;}
  .expert-mode-active .choice-btn:hover:not(:disabled) .choice-num{background:var(--expert);color:#000;}
  .choice-btn.correct{background:var(--correct);border-color:var(--correct-border);color:#fff;}
  .choice-btn.correct .choice-num{background:var(--correct-border);color:#fff;}
  .choice-btn.wrong{background:var(--wrong);border-color:var(--wrong-border);color:#fff;}
  .choice-btn.wrong .choice-num{background:var(--wrong-border);color:#fff;}
  .choice-btn:disabled{cursor:default;}

  /* 해설 */
  .explanation{display:none;background:rgba(88,166,255,0.06);border:1px solid rgba(88,166,255,0.2);border-radius:10px;padding:1rem 1.2rem;font-size:0.88rem;color:#a8c9f7;line-height:1.7;margin-bottom:1.4rem;}
  .explanation .ex-label{font-weight:700;color:var(--accent);margin-bottom:0.3rem;display:block;font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;}

  /* 단답형 */
  .short-answer-wrap{display:flex;gap:0.7rem;margin-bottom:1.4rem;flex-direction:column;}
  .short-input-row{display:flex;gap:0.7rem;}
  .short-input{flex:1;background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:0.85rem 1rem;border-radius:10px;font-size:0.95rem;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.15s;}
  .short-input:focus{border-color:var(--accent);}
  .short-input.correct{border-color:var(--correct-border);background:var(--correct);}
  .short-input.wrong{border-color:var(--wrong-border);background:var(--wrong);}
  .btn-submit{background:var(--accent);color:#fff;border:none;padding:0.85rem 1.4rem;border-radius:10px;font-size:0.9rem;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity 0.15s;white-space:nowrap;}
  .btn-submit:hover{opacity:0.85;}.btn-submit:disabled{opacity:0.4;cursor:default;}
  .sa-hint{font-size:0.82rem;color:var(--text-muted);padding:0 0.2rem;}
  .sa-hint.correct-hint{color:var(--accent3);font-weight:700;}
  .sa-hint.wrong-hint{color:var(--accent2);}

  /* 다음 버튼 */
  .btn-next{width:100%;background:linear-gradient(135deg,#58a6ff,#388bfd);color:#fff;border:none;padding:1rem;border-radius:12px;font-size:1rem;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:transform 0.15s,opacity 0.15s;display:none;}
  .btn-next.hard-next{background:linear-gradient(135deg,#c678dd,#9b59b6);}
  .btn-next.expert-next{background:linear-gradient(135deg,#f0b429,#d97706);color:#000;}
  .btn-next:hover{opacity:0.9;transform:translateY(-1px);}

  /* ── 결과 화면 ── */
  #result-screen{display:none;max-width:600px;margin:0 auto;padding:3rem 1.5rem;text-align:center;min-height:100vh;justify-content:center;flex-direction:column;align-items:center;}
  .result-emoji{font-size:5rem;margin-bottom:1rem;display:block;animation:bounce 0.5s ease;}
  @keyframes bounce{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  .result-title{font-family:'Black Han Sans',sans-serif;font-size:2.2rem;margin-bottom:0.5rem;}
  .result-score{font-size:3.5rem;font-weight:900;margin:1rem 0;}
  .result-score .score-num{color:var(--accent);}
  .result-score .score-num.hard-score{color:var(--hard);}
  .result-score .score-num.expert-score{color:var(--expert);}
  .result-diff-badge{display:inline-block;padding:0.3rem 1rem;border-radius:100px;font-size:0.8rem;font-weight:700;margin-bottom:0.5rem;}
  .result-diff-badge.normal{background:rgba(88,166,255,0.15);border:1px solid rgba(88,166,255,0.3);color:var(--accent);}
  .result-diff-badge.hard{background:var(--hard-bg);border:1px solid var(--hard-border);color:var(--hard);}
  .result-diff-badge.expert{background:var(--expert-bg);border:1px solid var(--expert-border);color:var(--expert);}
  .result-detail{color:var(--text-muted);margin-bottom:2rem;font-size:0.95rem;line-height:1.7;white-space:pre-line;}
  .result-bars{width:100%;max-width:400px;margin:0 auto 2rem;display:flex;flex-direction:column;gap:0.8rem;}
  .result-bar-row{display:flex;align-items:center;gap:0.8rem;font-size:0.85rem;}
  .result-bar-label{width:50px;text-align:right;color:var(--text-muted);flex-shrink:0;}
  .result-bar-track{flex:1;height:10px;background:var(--border);border-radius:99px;overflow:hidden;}
  .result-bar-fill-correct{height:100%;background:var(--accent3);border-radius:99px;transition:width 1s ease;}
  .result-bar-fill-wrong{height:100%;background:var(--accent2);border-radius:99px;transition:width 1s ease;}
  .result-bar-count{width:30px;font-weight:700;}
  .result-buttons{display:flex;gap:0.7rem;width:100%;max-width:480px;flex-wrap:wrap;}
  .btn-r{flex:1;min-width:100px;border:none;padding:0.85rem 0.5rem;border-radius:12px;font-size:0.88rem;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity 0.15s;}
  .btn-r:hover{opacity:0.85;}
  .btn-r.normal{background:linear-gradient(135deg,#58a6ff,#388bfd);color:#fff;}
  .btn-r.hard-btn{background:linear-gradient(135deg,#c678dd,#9b59b6);color:#fff;}
  .btn-r.expert-btn{background:linear-gradient(135deg,#f0b429,#d97706);color:#000;}
  .btn-r.home{background:var(--card);color:var(--text);border:1.5px solid var(--border);}
  .btn-r.home:hover{border-color:var(--accent);}

  /* ── 단원 버튼 ── */
  .topic-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.7rem;width:100%;max-width:680px;margin-bottom:0.5rem;}
  .topic-btn{padding:0.75rem 0.5rem;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text-muted);font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:0.2rem;}
  .topic-btn .topic-icon{font-size:1.3rem;}
  .topic-btn .topic-name{font-size:0.88rem;font-weight:700;}
  .topic-btn .topic-desc{font-size:0.62rem;font-weight:400;opacity:0.7;text-align:center;}
  .topic-btn.selected-topic{border-color:#56d364;background:rgba(86,211,100,0.12);color:#56d364;}
  .topic-badge{display:inline-flex;align-items:center;gap:0.3rem;background:rgba(86,211,100,0.12);border:1px solid rgba(86,211,100,0.3);color:#56d364;font-size:0.72rem;font-weight:700;padding:0.2rem 0.6rem;border-radius:100px;margin-right:0.4rem;}

  @media(max-width:600px){
    .info-grid{grid-template-columns:repeat(3,1fr);gap:0.6rem;}
    .question-text{font-size:0.95rem;}
    .choice-btn{font-size:0.85rem;padding:0.75rem 0.9rem;}
    .hq-two-col{grid-template-columns:1fr;}
    .diff-buttons{flex-direction:column;}
    .topic-grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>

<!-- ══ 시작 화면 ══ -->
<div id="start-screen">
  <div class="start-badge">🔍 시험 대비 퀴즈</div>
  <h1 class="start-title">디지털 포렌식<br>& 네트워크</h1>
  <p class="start-sub">주제별 문제를 선택해 바로 시작하세요</p>

  <!-- 단원 선택 -->
  <p class="diff-select-label" style="margin-top:0.5rem">📚 단원 선택</p>
  <div class="topic-grid">
    <button class="topic-btn selected-topic" id="btn-topic-all" onclick="selectTopic('all')">
      <span class="topic-icon">📋</span><span class="topic-name">전체</span><span class="topic-desc">6개 단원 통합</span>
    </button>
    <button class="topic-btn" id="btn-topic-sig" onclick="selectTopic('sig')">
      <span class="topic-icon">🔢</span><span class="topic-name">1단원</span><span class="topic-desc">파일 시그니처</span>
    </button>
    <button class="topic-btn" id="btn-topic-proc" onclick="selectTopic('proc')">
      <span class="topic-icon">⚙️</span><span class="topic-name">2단원</span><span class="topic-desc">프로세스</span>
    </button>
    <button class="topic-btn" id="btn-topic-tcp" onclick="selectTopic('tcp')">
      <span class="topic-icon">🌐</span><span class="topic-name">3단원</span><span class="topic-desc">TCP / UDP</span>
    </button>
    <button class="topic-btn" id="btn-topic-arp" onclick="selectTopic('arp')">
      <span class="topic-icon">🗺️</span><span class="topic-name">4단원</span><span class="topic-desc">ARP / 라우팅</span>
    </button>
    <button class="topic-btn" id="btn-topic-ip" onclick="selectTopic('ip')">
      <span class="topic-icon">📦</span><span class="topic-name">5단원</span><span class="topic-desc">IP 패킷 헤더</span>
    </button>
    <button class="topic-btn" id="btn-topic-sec" onclick="selectTopic('sec')">
      <span class="topic-icon">🛡️</span><span class="topic-name">6단원</span><span class="topic-desc">네트워크 보안장비</span>
    </button>
  </div>

  <div class="info-grid" style="max-width:360px;margin-bottom:1.5rem">
    <div class="info-card"><span class="num" id="info-qcount">20</span><div class="lbl">문제 수</div></div>
    <div class="info-card"><span class="num" style="color:var(--yellow)">랜덤</span><div class="lbl">출제 방식</div></div>
    <div class="info-card"><span class="num" style="color:var(--accent3)">즉시</span><div class="lbl">해설 제공</div></div>
  </div>

  <button class="btn-start" id="btn-start-main" onclick="startQuiz()">🚀 문제 시작하기 →</button>
</div>

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pickMC(choices,answerIdx,noShuffle){
  if(noShuffle)return{shuffledChoices:choices,newAnswerIdx:answerIdx};
  if(choices.length<=4){
    const correct=choices[answerIdx];
    const wrong=shuffle(choices.filter((_,i)=>i!==answerIdx)).slice(0,3);
    const pool=shuffle([correct,...wrong]);
    return{shuffledChoices:pool,newAnswerIdx:pool.indexOf(correct)};
  }
  return{shuffledChoices:choices,newAnswerIdx:answerIdx};
}
function checkSA(input,answers){
  const norm=s=>s.replace(/\s/g,'').toLowerCase();
  return answers.some(a=>norm(a)===norm(input));
}

{topic:'arp',type:'mc',q:'ARP 테이블과 라우팅 테이블의 차이로 옳은 것은?',choices:['ARP 테이블은 IP↔MAC 변환, 라우팅 테이블은 IP↔경로 정보 저장','ARP 테이블은 경로 정보, 라우팅 테이블은 MAC 주소 저장','둘 다 MAC 주소를 기반으로 동작','둘 다 3계층에서 동작'],answer:0,exp:'ARP 테이블은 IP↔MAC 주소 매핑(2계층), 라우팅 테이블은 목적지 IP↔다음 홉 경로(3계층)를 저장합니다.'},
// ── 5단원: IP 패킷 헤더 ──
{topic:'ip',type:'mc',q:'IP 패킷 헤더의 Version 필드(4비트)의 역할은?',choices:['IPv4인지 IPv6인지 프로토콜 버전을 구분','헤더의 길이를 나타냄','패킷 전체 크기를 나타냄','TTL 값을 저장'],answer:0,exp:'Version 필드(4비트)는 IP 프로토콜 버전을 나타냅니다. IPv4이면 4, IPv6이면 6이 저장됩니다.'},
{topic:'ip',type:'mc',q:'IP 헤더의 TTL(Time To Live) 필드의 역할은?',choices:['패킷이 네트워크에서 영원히 떠다니지 않도록 방지','패킷의 우선순위를 설정','송신자의 IP 주소를 저장','헤더 오류를 검출'],answer:0,exp:'TTL은 라우터를 거칠 때마다 1씩 감소하며, 0이 되면 패킷을 폐기합니다. 이로써 패킷이 무한히 순환하는 것을 방지합니다.'},
{topic:'ip',type:'mc',q:'IP 헤더의 IHL(Internet Header Length) 필드가 나타내는 것은?',choices:['IP 헤더의 길이(4바이트 단위)','패킷 전체의 길이','데이터 페이로드의 길이','단편화 오프셋'],answer:0,exp:'IHL(4비트)은 IP 헤더의 길이를 4바이트 단위로 나타냅니다. 최솟값은 5(=20바이트)입니다.'},
{topic:'ip',type:'mc',q:'IP 헤더의 Flags 필드 중 DF(Don\'t Fragment) 비트의 역할은?',choices:['조각화 금지. 1이면 단편화 불가, MTU 초과 시 전송 실패','더 많은 조각이 있음을 표시','단편의 위치를 나타냄','패킷 식별 번호를 저장'],answer:0,exp:'DF(Don\'t Fragment) 비트가 1이면 해당 패킷은 단편화할 수 없습니다. MTU보다 클 경우 전송이 실패하고 ICMP 오류 메시지가 전송됩니다.'},
{topic:'ip',type:'mc',q:'IP 헤더의 Identification 필드의 역할은?',choices:['단편화된 패킷 조각들을 같은 패킷으로 식별하기 위한 고유 번호','패킷의 전체 크기를 나타냄','수신자 IP 주소를 저장','헤더 오류를 검출'],answer:0,exp:'Identification(16비트)은 패킷마다 고유한 번호로, 단편화된 경우 같은 원본 패킷의 조각들은 동일한 Identification 값을 가집니다.'},
{topic:'ip',type:'mc',q:'IP 헤더 Total Length 필드가 나타낼 수 있는 최대 크기는?',choices:['65535 바이트','32767 바이트','255 바이트','1500 바이트'],answer:0,exp:'Total Length는 16비트 필드이므로 최대 2^16-1 = 65535바이트까지 표현 가능합니다.'},
{topic:'ip',type:'mc',q:'IP 헤더의 Protocol 필드 역할은?',choices:['상위 전송 계층의 프로토콜(TCP, UDP 등)을 지정','IP 버전을 구분','패킷 조각의 위치를 표시','헤더 체크섬을 저장'],answer:0,exp:'Protocol(8비트) 필드는 상위 계층(4계층) 프로토콜을 지정합니다. TCP=6, UDP=17, ICMP=1입니다.'},
{topic:'ip',type:'mc',q:'IP 헤더의 Header Checksum 필드의 역할은?',choices:['전송 중 IP 헤더의 오류를 검출','데이터 페이로드의 오류를 검출','패킷 전체의 암호화','TTL을 계산'],answer:0,exp:'Header Checksum(16비트)은 IP 헤더의 오류를 검출합니다. 라우터를 지날 때마다 재계산됩니다.'},
{topic:'ip',type:'mc',q:'IP 헤더의 Fragment Offset 필드(13비트)의 역할은?',choices:['단편화된 패킷 조각의 원본 데이터에서의 위치(오프셋) 표시','패킷의 고유 식별 번호 저장','헤더 길이 표시','남은 조각이 있는지 표시'],answer:0,exp:'Fragment Offset(13비트)은 단편화된 조각이 원래 데이터에서 몇 번째 위치에 해당하는지를 8바이트 단위로 나타냅니다.'},
{topic:'ip',type:'mc',q:'IP 헤더의 Flags 필드 중 MF(More Fragments) 비트가 0인 경우는?',choices:['마지막 단편 조각이거나 단편화되지 않은 패킷','첫 번째 단편 조각','중간 단편 조각','조각화가 금지된 패킷'],answer:0,exp:'MF(More Fragments) 비트가 0이면 이 조각이 마지막이거나 단편화가 없는 패킷임을 의미합니다. 1이면 뒤에 더 많은 조각이 있습니다.'},
{topic:'ip',type:'sa',q:'IP 헤더에서 송신자와 수신자를 식별하는 필드의 크기(각각)를 쓰시오.',answers:['32비트','32 비트','4바이트','4 바이트'],exp:'Source Address와 Destination Address는 각각 32비트(4바이트)로 IPv4 주소를 저장합니다.'},
// ── 6단원: 네트워크 보안장비 ──
{topic:'sec',type:'mc',q:'IDS(Intrusion Detection System)의 특징으로 올바른 것은?',choices:['침입을 탐지하지만 차단은 하지 않는다','침입을 탐지하고 자동으로 차단한다','방화벽 기능이 포함된 통합 보안 장비이다','보안 로그를 통합 분석하는 장비이다'],answer:0,exp:'IDS는 네트워크 트래픽을 미러링하여 침입을 탐지하고 경고를 발생시키지만, 직접 차단하는 기능은 없습니다.'},
{topic:'sec',type:'mc',q:'IPS(Intrusion Prevention System)와 IDS의 차이점은?',choices:['IPS는 탐지 + 자동 차단, IDS는 탐지만 한다','IPS는 탐지만, IDS는 탐지 + 차단을 한다','IPS는 로그 분석, IDS는 패킷 차단을 한다','둘의 기능은 동일하다'],answer:0,exp:'IPS는 인라인(inline)으로 설치되어 공격을 탐지하고 자동으로 차단합니다. IDS는 미러링 방식으로 탐지만 합니다.'},
{topic:'sec',type:'mc',q:'UTM(Unified Threat Management)에 대한 설명으로 옳은 것은?',choices:['방화벽·IPS·바이러스 검사·VPN 등 여러 기능을 하나의 장비에 통합','침입 탐지만 수행하는 전용 장비','보안 로그를 통합 분석하는 소프트웨어','라우팅 경로를 관리하는 네트워크 장비'],answer:0,exp:'UTM은 방화벽, IDS/IPS, 안티바이러스, 웹 필터링, VPN, NAT 등을 하나의 장비에 통합한 솔루션으로, 소형 기업에서 많이 사용합니다.'},
{topic:'sec',type:'mc',q:'ESM(Enterprise Security Management)의 주요 역할은?',choices:['다양한 보안 장비의 로그를 수집·통합 분석하고 관리','인라인으로 설치되어 패킷을 직접 차단','바이러스를 실시간으로 검사하고 격리','방화벽으로 패킷 접근을 제어'],answer:0,exp:'ESM은 IDS, IPS, UTM, 방화벽 등 다양한 보안 장비의 로그를 수집하고 통합 분석하여 보안 관리자에게 종합적인 가시성을 제공합니다.'},
{topic:'sec',type:'mc',q:'IDS가 설치되는 방식은?',choices:['미러링(Mirror) 방식 — 트래픽을 복사해 모니터링','인라인(Inline) 방식 — 실제 트래픽 흐름에 삽입','게이트웨이(Gateway) 방식 — 모든 트래픽을 경유','브리지(Bridge) 방식 — 네트워크를 분리'],answer:0,exp:'IDS는 트래픽을 복사(미러링)하여 모니터링하므로 네트워크 흐름에 영향을 주지 않습니다. IPS는 인라인 방식으로 설치됩니다.'},
{topic:'sec',type:'mc',q:'ESM의 대표적인 시스템으로 옳은 것은?',choices:['SIEM (Splunk, QRadar, ArcSight 등)','방화벽 (Firewall)','IPS (Snort, Suricata 등)','UTM 장비'],answer:0,exp:'ESM은 SIEM(Security Information and Event Management)을 포함하며, Splunk·QRadar·ArcSight 등이 대표적인 SIEM 솔루션입니다.'},
{topic:'sec',type:'mc',q:'다음 중 직접 공격 패킷을 차단할 수 없는 보안 장비는?',choices:['IDS','IPS','UTM','방화벽'],answer:0,exp:'IDS는 탐지 및 경고만 가능하고 직접 차단 기능이 없습니다. IPS, UTM, 방화벽은 모두 차단 기능을 가집니다.'},
{topic:'sec',type:'sa',q:'IPS의 약어 풀네임을 쓰시오.',answers:['Intrusion Prevention System','intrusion prevention system'],exp:'IPS는 Intrusion Prevention System(침입 방지 시스템)의 약어입니다.'},
{topic:'sec',type:'mc',q:'다음 중 UTM에 포함될 수 있는 기능을 모두 포함한 것은?',choices:['방화벽 + IPS + 안티바이러스 + VPN + 웹필터링','IDS + 라우팅 + DNS + DHCP','ESM + 방화벽 + IPS','SIEM + IDS + 안티바이러스'],answer:0,exp:'UTM(통합 보안 장비)은 방화벽, IPS, 안티바이러스, VPN, NAT, 웹 필터링 등 다양한 보안 기능을 하나로 통합합니다.'},
];

{topic:'proc',type:'mc_hard',fmt:'생명주기 흐름도',q:'다음 프로세스 생명주기 흐름도에서 ㉠, ㉡에 들어갈 상태가 바르게 연결된 것은?',htmlContent:`<div class="hq-arrow-flow"><div class="hq-flow-box">생성<br>(New)</div><div class="hq-flow-arrow">→</div><div class="hq-flow-blank">( ㉠ )</div><div class="hq-flow-arrow">→</div><div class="hq-flow-box">실행<br>(Running)</div><div class="hq-flow-arrow">→</div><div class="hq-flow-blank">( ㉡ )</div><div class="hq-flow-arrow">→</div><div class="hq-flow-box">종료<br>(Terminated)</div></div>`,choices:['㉠ 준비(Ready) — ㉡ 대기(Waiting)','㉠ 대기(Waiting) — ㉡ 준비(Ready)','㉠ 실행(Running) — ㉡ 준비(Ready)','㉠ 준비(Ready) — ㉡ 실행(Running)'],answer:0,noShuffle:true,exp:'생성(New) → 준비(Ready) → 실행(Running) → 대기(Waiting) → 종료(Terminated) 순서입니다.'},
{topic:'proc',type:'mc_hard',fmt:'구성요소 분류',q:'다음 A~D를 프로세스 메모리 구조에 맞게 분류할 때 올바른 것은?',htmlContent:`<div class="hq-box">A. 지역 변수, 함수 호출 정보, 리턴 주소<br>B. malloc()으로 동적 할당한 메모리<br>C. 전역 변수, 정적 변수<br>D. CPU가 실행하는 기계어 명령어</div>`,choices:['A-스택, B-힙, C-데이터 영역, D-코드 영역','A-힙, B-스택, C-코드 영역, D-데이터 영역','A-데이터, B-힙, C-스택, D-코드 영역','A-스택, B-데이터, C-힙, D-코드 영역'],answer:0,exp:'A=스택(지역변수·함수호출), B=힙(동적할당), C=데이터 영역(전역·정적변수), D=코드(텍스트) 영역(기계어)'},
{topic:'proc',type:'mc_hard',fmt:'포렌식 적용',q:'프로세스 포렌식에서 메모리 덤프 분석 시 힙(Heap) 영역을 분석하는 주요 이유는?',choices:['악성코드가 동적으로 할당한 메모리에 암호키·실행 코드를 숨길 수 있어서','CPU 레지스터 값을 확인하기 위해서','실행 파일의 소스 코드를 복원하기 위해서','네트워크 패킷 헤더를 분석하기 위해서'],answer:0,exp:'힙 영역은 동적으로 할당되므로, 악성코드가 실행 중 메모리에 코드·키·데이터를 숨기는 곳입니다. 포렌식에서 힙 분석은 중요합니다.'},
{topic:'proc',type:'mc_hard',fmt:'개념 비교',q:'프로그램(Program)과 프로세스(Process)의 차이로 옳은 것은?',choices:['프로그램은 디스크에 저장된 파일이고, 프로세스는 메모리에 올라가 실행 중인 프로그램이다','프로그램은 메모리에 올라간 것이고, 프로세스는 디스크에 저장된 파일이다','프로그램과 프로세스는 동일한 개념이다','프로세스는 CPU 내부의 연산 단위이다'],answer:0,exp:'프로그램은 디스크에 저장된 실행 가능한 파일이고, 프로세스는 그 프로그램이 메모리에 적재되어 실행 중인 상태입니다.'},
{topic:'proc',type:'mc_hard',fmt:'PCB 분석형',q:'다음 중 PCB(Process Control Block)에 포함되지 않는 정보는?',htmlContent:`<div class="hq-box">① 프로세스 ID (PID)<br>② 프로세스 현재 상태 (Ready/Running/Waiting 등)<br>③ CPU 레지스터 상태<br>④ 힙 영역에 저장된 실제 데이터 값<br>⑤ 우선순위</div>`,choices:['①','②','③','④','⑤'],answer:3,noShuffle:true,exp:'④가 틀렸습니다. PCB는 프로세스 관리 정보(ID, 상태, 레지스터, 우선순위 등)를 저장하며, 힙 영역의 실제 데이터 값은 PCB가 아닌 프로세스의 메모리 공간에 있습니다.'},
// ── 3단원: TCP와 UDP ──
{topic:'tcp',type:'mc_hard',fmt:'사례 적용형',q:'다음 각 서비스에 적합한 프로토콜을 바르게 연결한 것은?',htmlContent:`<div class="hq-table-wrap"><table class="hq-table"><thead><tr><th>서비스</th><th>적합한 프로토콜</th></tr></thead><tbody><tr><td>A. 인터넷 뱅킹 파일 전송</td><td>(가)</td></tr><tr><td>B. 실시간 온라인 게임</td><td>(나)</td></tr><tr><td>C. 이메일 전송</td><td>(다)</td></tr><tr><td>D. 인터넷 라디오 스트리밍</td><td>(라)</td></tr></tbody></table></div>`,choices:['A-TCP, B-UDP, C-TCP, D-UDP','A-UDP, B-TCP, C-UDP, D-TCP','A-TCP, B-TCP, C-UDP, D-UDP','A-UDP, B-UDP, C-TCP, D-TCP'],answer:0,noShuffle:true,exp:'신뢰성이 중요한 파일 전송·이메일=TCP, 속도가 중요한 실시간 게임·스트리밍=UDP입니다.'},
{topic:'tcp',type:'mc_hard',fmt:'헤더 비교형',q:'다음 표에서 ㉠, ㉡에 들어갈 내용이 바르게 연결된 것은?',htmlContent:`<div class="hq-table-wrap"><table class="hq-table"><thead><tr><th>특징</th><th>TCP</th><th>UDP</th></tr></thead><tbody><tr><td>헤더 크기</td><td>( ㉠ )</td><td>8바이트</td></tr><tr><td>신뢰성</td><td>있음</td><td>없음</td></tr><tr><td>순서 보장</td><td>있음</td><td>( ㉡ )</td></tr></tbody></table></div>`,choices:['㉠ 20~60바이트 — ㉡ 없음','㉠ 8바이트 — ㉡ 있음','㉠ 20바이트 — ㉡ 없음','㉠ 20~60바이트 — ㉡ 있음'],answer:0,noShuffle:true,exp:'TCP 헤더는 20~60바이트, UDP는 8바이트입니다. UDP는 순서 보장이 없습니다.'},
{topic:'tcp',type:'mc_hard',fmt:'옳고 그름 판단',q:'다음 중 TCP에 대한 설명으로 옳은 것만 고른 것은?',htmlContent:`<div class="hq-box">ㄱ. 3-way handshake로 연결을 설정한다.<br>ㄴ. 패킷 손실 시 재전송 기능이 있다.<br>ㄷ. 헤더 크기는 항상 8바이트로 고정이다.<br>ㄹ. 혼잡 제어(Congestion Control) 기능을 제공한다.</div>`,choices:['ㄱ, ㄴ, ㄷ, ㄹ 모두','ㄱ, ㄴ, ㄹ','ㄴ, ㄷ, ㄹ','ㄱ, ㄷ'],answer:1,exp:'ㄷ이 틀렸습니다. 헤더가 8바이트로 고정인 것은 UDP입니다. TCP 헤더는 20~60바이트입니다.'},
{topic:'tcp',type:'mc_hard',fmt:'주장 반박형',q:'다음 주장에 대한 반박으로 가장 적절한 것은?',htmlContent:`<div class="hq-box"><div class="hq-box-title">학생의 주장</div>"UDP는 신뢰성이 없으니 어떤 상황에서도 TCP를 사용하는 것이 항상 더 좋다."</div>`,choices:['실시간 스트리밍이나 게임처럼 속도가 중요하고 약간의 손실이 허용되는 경우 UDP가 TCP보다 유리하다','UDP는 어떤 상황에서도 사용하면 안 된다','TCP는 항상 UDP보다 빠르다','신뢰성이 없으면 데이터를 전혀 전달할 수 없다'],answer:0,exp:'UDP는 연결 설정 오버헤드가 없어 실시간 스트리밍, 온라인 게임, VoIP처럼 속도가 중요하고 약간의 손실이 허용되는 환경에 더 적합합니다.'},
// ── 4단원: ARP/라우팅 테이블 ──
{topic:'arp',type:'mc_hard',fmt:'계층 분류형',q:'다음 A~D를 OSI 계층에 따라 ARP 테이블과 라우팅 테이블로 분류할 때 옳은 것은?',htmlContent:`<div class="hq-box">A. IP 주소를 MAC 주소로 변환<br>B. 목적지 IP에 대해 다음 홉 결정<br>C. 2계층(데이터 링크 계층) 동작<br>D. 3계층(네트워크 계층) 동작</div>`,choices:['ARP 테이블: A·C / 라우팅 테이블: B·D','ARP 테이블: B·D / 라우팅 테이블: A·C','ARP 테이블: A·D / 라우팅 테이블: B·C','ARP 테이블: B·C / 라우팅 테이블: A·D'],answer:0,exp:'ARP 테이블은 IP→MAC 변환(A)·2계층(C), 라우팅 테이블은 다음 홉 결정(B)·3계층(D)에 해당합니다.'},
{topic:'arp',type:'mc_hard',fmt:'항목 분석형',q:'라우팅 테이블의 항목 예시 "192.168.1.0/24 via 192.168.0.1 dev eth0"에서 "192.168.0.1"이 의미하는 것은?',choices:['다음 홉(next hop) — 패킷을 전달할 다음 라우터의 IP','목적지 네트워크의 서브넷 마스크','현재 장치의 IP 주소','DNS 서버 주소'],answer:0,exp:'"via 192.168.0.1"의 192.168.0.1은 다음 홉(next hop), 즉 패킷을 전달할 다음 라우터(게이트웨이)의 IP 주소입니다.'},
{topic:'arp',type:'mc_hard',fmt:'동작 시점 판단',q:'다음 중 ARP 테이블을 참조하는 시점으로 가장 옳은 것은?',choices:['같은 네트워크 내의 호스트에 패킷을 보낼 때 목적지 MAC 주소가 필요한 경우','다른 네트워크로 패킷을 라우팅할 경로를 결정할 때','DNS 서버에서 도메인을 IP로 변환할 때','TCP 연결을 설정할 때'],answer:0,exp:'ARP 테이블은 같은 네트워크(서브넷) 내에서 통신할 때 목적지 MAC 주소를 알아내기 위해 참조합니다.'},
{topic:'arp',type:'mc_hard',fmt:'포렌식 활용형',q:'네트워크 포렌식에서 ARP 테이블 분석이 유용한 이유는?',choices:['특정 IP가 어떤 MAC 주소와 통신했는지 추적하여 공격자 장치를 식별 가능','패킷의 전송 경로를 역추적할 수 있어서','암호화된 패킷을 복호화할 수 있어서','DNS 캐시를 분석할 수 있어서'],answer:0,exp:'ARP 테이블에 IP-MAC 매핑 정보가 남아 있어, 특정 IP 주소를 사용한 물리적 장치(MAC 주소)를 추적하는 데 활용됩니다.'},
{topic:'arp',type:'mc_hard',fmt:'ARP 스푸핑 분석',q:'ARP 스푸핑(ARP Spoofing) 공격이 가능한 이유로 가장 적절한 것은?',choices:['ARP는 응답을 검증 없이 신뢰하여 ARP 테이블을 갱신하기 때문','라우팅 테이블이 암호화되어 있지 않기 때문','TCP가 연결 지향적이기 때문','IP 헤더에 인증 필드가 없기 때문'],answer:0,exp:'ARP 프로토콜은 응답의 신뢰성을 검증하지 않으므로, 공격자가 위조된 ARP 응답을 보내 피해자의 ARP 테이블을 조작할 수 있습니다.'},
// ── 5단원: IP 패킷 헤더 ──
{topic:'ip',type:'mc_hard',fmt:'헤더 구조 분석',q:'IP 패킷 헤더에서 비트 크기가 바르게 연결된 것은?',htmlContent:`<div class="hq-table-wrap"><table class="hq-table"><thead><tr><th>필드</th><th>비트 크기</th></tr></thead><tbody><tr><td>Version</td><td>(가)</td></tr><tr><td>IHL</td><td>(나)</td></tr><tr><td>TTL</td><td>(다)</td></tr><tr><td>Flags</td><td>(라)</td></tr></tbody></table></div>`,choices:['(가)4 (나)4 (다)8 (라)3','(가)8 (나)4 (다)8 (라)3','(가)4 (나)8 (다)16 (라)3','(가)4 (나)4 (다)8 (라)8'],answer:0,noShuffle:true,exp:'Version=4비트, IHL=4비트, TTL=8비트, Flags=3비트입니다.'},
{topic:'ip',type:'mc_hard',fmt:'단편화 분석형',q:'IP 단편화에 관한 다음 설명 중 옳지 않은 것은?',htmlContent:`<div class="hq-box">① 단편화된 조각들은 동일한 Identification 값을 가진다.<br>② DF(Don\'t Fragment) 비트가 1이면 단편화를 할 수 없다.<br>③ 마지막 단편 조각은 MF(More Fragments) 비트가 1이다.<br>④ Fragment Offset은 조각의 원본 데이터에서의 위치를 나타낸다.</div>`,choices:['①','②','③','④'],answer:2,noShuffle:true,exp:'③이 틀렸습니다. 마지막 단편 조각의 MF 비트는 0입니다. MF=1이면 아직 더 많은 조각이 있다는 의미이고, 마지막 조각에서는 0으로 설정됩니다.'},
{topic:'ip',type:'mc_hard',fmt:'흐름도 완성형',q:'IP 패킷이 라우터를 지날 때마다 변화하는 필드와 변하지 않는 필드를 바르게 구분한 것은?',htmlContent:`<div class="hq-two-col"><div class="hq-col-card"><div class="hq-col-label">라우터 통과마다 변하는 필드</div>?</div><div class="hq-col-card"><div class="hq-col-label">변하지 않는 필드</div>?</div></div>`,choices:['변하는 것: TTL·Header Checksum / 변하지 않는 것: Source·Destination IP','변하는 것: Source IP·TTL / 변하지 않는 것: Destination IP·Checksum','변하는 것: Destination IP·Flags / 변하지 않는 것: TTL·Checksum','변하는 것: Protocol·TTL / 변하지 않는 것: Source IP·Flags'],answer:0,exp:'TTL은 라우터마다 1씩 감소하고, Header Checksum은 TTL 변경 시 재계산됩니다. Source/Destination IP는 일반적으로 변하지 않습니다.'},
{topic:'ip',type:'mc_hard',fmt:'필드 역할 추론',q:'IP 헤더의 TOS(Type of Service) 필드의 실제 활용 예로 가장 적절한 것은?',choices:['VoIP 패킷에 높은 우선순위를 부여하여 지연을 최소화','패킷의 단편화 여부를 결정','목적지까지의 최단 경로를 계산','패킷의 암호화 여부를 표시'],answer:0,exp:'TOS(또는 DSCP) 필드는 서비스 품질(QoS) 제어에 사용됩니다. VoIP, 화상통화 등 지연에 민감한 트래픽에 높은 우선순위를 부여하는 데 활용됩니다.'},
{topic:'ip',type:'mc_hard',fmt:'Flags 비트 판단',q:'IP 헤더 Flags 필드의 각 비트 의미로 옳은 것은?',htmlContent:`<div class="hq-table-wrap"><table class="hq-table"><thead><tr><th>비트 위치</th><th>이름</th><th>설명</th></tr></thead><tbody><tr><td>0번</td><td>RSV</td><td>사용되지 않음, 항상 0</td></tr><tr><td>1번</td><td>DF</td><td>조각화 금지, 1이면 단편화 불가</td></tr><tr><td>2번</td><td>MF</td><td>추가 단편 존재, 마지막 조각은 0</td></tr></tbody></table></div>`,choices:['0번=RSV(예약), 1번=DF(조각화금지), 2번=MF(추가단편)으로 모두 옳다','0번=DF, 1번=MF, 2번=RSV이다','0번=MF, 1번=RSV, 2번=DF이다','0번=RSV, 1번=MF, 2번=DF이다'],answer:0,noShuffle:true,exp:'Flags 3비트: 0번=RSV(항상0), 1번=DF(Don\'t Fragment), 2번=MF(More Fragments)입니다.'},
{topic:'ip',type:'mc_hard',fmt:'포렌식 패킷 분석',q:'캡처된 IP 패킷에서 TTL=1이고 목적지 IP가 8.8.8.8인 경우, 이 패킷의 상황으로 가장 적절한 것은?',choices:['다음 라우터에서 TTL이 0이 되어 패킷이 폐기될 것이다','패킷이 목적지에 정상 도달할 것이다','단편화가 발생할 것이다','헤더 체크섬 오류가 발생할 것이다'],answer:0,exp:'TTL=1인 패킷은 다음 라우터에서 1을 감산하여 TTL=0이 되면 패킷이 폐기되고 ICMP Time Exceeded 메시지가 송신자에게 반환됩니다.'},
{topic:'ip',type:'mc_hard',fmt:'헤더 크기 계산',q:'IHL 필드 값이 5일 때 IP 헤더의 크기는?',choices:['20바이트 (5×4바이트)','5바이트','40바이트 (5×8바이트)','10바이트 (5×2바이트)'],answer:0,exp:'IHL은 4바이트(32비트) 단위로 헤더 길이를 나타냅니다. IHL=5이면 5×4=20바이트입니다. IP 헤더의 최소 크기는 20바이트입니다.'},
{topic:'ip',type:'mc_hard',fmt:'필드 종합 판단',q:'다음 IP 헤더 필드 설명 중 옳지 않은 것은?',htmlContent:`<div class="hq-box">① Version: IPv4는 4, IPv6는 6이 저장된다.<br>② Total Length: 최대 65535바이트까지 표현 가능 (16비트).<br>③ Protocol: TCP=6, UDP=17, ICMP=1이 대표적이다.<br>④ Header Checksum: 전체 IP 패킷(헤더+데이터)의 오류를 검출한다.</div>`,choices:['①','②','③','④'],answer:3,noShuffle:true,exp:'④가 틀렸습니다. Header Checksum은 IP 헤더만의 오류를 검출합니다. 데이터(페이로드)의 오류 검출은 TCP/UDP의 체크섬이 담당합니다.'},
// ── 6단원: 보안장비 ──
{topic:'sec',type:'mc_hard',fmt:'장비 비교형',q:'다음 보안 장비들을 직접 차단 가능 여부로 구분할 때 옳은 것은?',htmlContent:`<div class="hq-box">A. IDS<br>B. IPS<br>C. UTM<br>D. ESM</div>`,choices:['차단 가능: B·C / 차단 불가: A·D','차단 가능: A·B / 차단 불가: C·D','차단 가능: A·C·D / 차단 불가: B','차단 가능: B·C·D / 차단 불가: A'],answer:0,exp:'IPS(B)와 UTM(C)은 직접 차단 가능합니다. IDS(A)는 탐지만, ESM(D)은 로그 분석만 하므로 직접 차단 불가입니다.'},
{topic:'sec',type:'mc_hard',fmt:'설치 방식 판단',q:'다음 중 인라인(Inline) 방식으로 설치되는 보안 장비는?',choices:['IPS','IDS','ESM','SIEM'],answer:0,exp:'IPS는 실제 트래픽 경로에 인라인으로 설치되어 공격 패킷을 즉시 차단합니다. IDS는 미러링 방식으로 트래픽 경로에 영향을 주지 않습니다.'},
{topic:'sec',type:'mc_hard',fmt:'흐름도 완성',q:'다음 네트워크 보안 장비 배치 흐름도에서 ㉠, ㉡에 들어갈 장비가 바르게 연결된 것은?',htmlContent:`<div class="hq-arrow-flow"><div class="hq-flow-box">외부망<br>(인터넷)</div><div class="hq-flow-arrow">→</div><div class="hq-flow-blank">( ㉠ )<br>접근제어·NAT·VPN</div><div class="hq-flow-arrow">→</div><div class="hq-flow-blank">( ㉡ )<br>침입탐지+차단</div><div class="hq-flow-arrow">→</div><div class="hq-flow-box">내부망</div></div>`,choices:['㉠ UTM/방화벽 — ㉡ IPS','㉠ IPS — ㉡ UTM','㉠ IDS — ㉡ ESM','㉠ ESM — ㉡ IDS'],answer:0,noShuffle:true,exp:'외부망→UTM/방화벽(접근제어·NAT·VPN)→IPS(인라인 침입탐지+차단)→내부망 순서가 일반적인 배치입니다.'},
{topic:'sec',type:'mc_hard',fmt:'역할 구분형',q:'ESM과 IPS의 차이점으로 가장 옳은 것은?',choices:['ESM은 보안 로그 통합 분석, IPS는 실시간 침입 탐지·차단','ESM은 침입 차단, IPS는 로그 분석','두 장비 모두 실시간 차단 기능을 가진다','ESM은 인라인 설치, IPS는 미러링 방식으로 설치'],answer:0,exp:'ESM은 다양한 보안 장비의 로그를 수집·분석하는 관리 시스템이고, IPS는 인라인으로 설치되어 실시간 침입을 탐지하고 차단합니다.'},
{topic:'sec',type:'mc_hard',fmt:'적용 판단형',q:'소규모 기업이 예산 한계로 단일 보안 장비만 도입할 때 가장 적합한 장비는?',htmlContent:`<div class="hq-box">조건: 방화벽 기능 + 바이러스 검사 + IPS 기능 + VPN 필요</div>`,choices:['UTM','IDS','ESM','SIEM'],answer:0,exp:'UTM(Unified Threat Management)은 방화벽·IPS·안티바이러스·VPN 등 여러 보안 기능을 하나의 장비에 통합한 솔루션으로, 소규모 기업에 적합합니다.'},
{topic:'sec',type:'mc_hard',fmt:'대화 판단형',q:'다음 대화에서 옳은 내용을 말한 학생만 고른 것은?',htmlContent:`<div class="hq-box"><strong>A:</strong> "IDS는 미러링 방식으로 트래픽을 모니터링하고, 탐지 시 경고만 발생시켜."<br><br><strong>B:</strong> "IPS는 트래픽 경로에 인라인으로 설치되어 공격을 자동으로 차단해."<br><br><strong>C:</strong> "ESM은 인라인으로 설치되어 패킷을 직접 차단하는 역할이야."<br><br><strong>D:</strong> "UTM은 여러 보안 기능을 하나의 장비에 통합한 솔루션이야."</div>`,choices:['A, B, C, D 모두','A, B, D','B, C, D','A, C'],answer:1,exp:'C가 틀렸습니다. ESM은 직접 차단하지 않고 보안 로그를 통합 분석하는 관제/분석 시스템입니다. A, B, D는 올바른 설명입니다.'},
{topic:'sec',type:'mc_hard',fmt:'종합 오류 찾기',q:'다음 보안 장비 설명 중 옳지 않은 것은?',htmlContent:`<div class="hq-box"><span class="hq-underline">① IDS</span>: 침입 탐지 후 경고 발생, 직접 차단은 하지 않음<br><span class="hq-underline">② IPS</span>: 탐지와 자동 차단 모두 수행, 인라인 설치<br><span class="hq-underline">③ UTM</span>: 방화벽+IPS+안티바이러스 등을 하나로 통합<br><span class="hq-underline">④ ESM</span>: 인라인으로 설치되어 실시간으로 패킷을 차단</div>`,choices:['①','②','③','④'],answer:3,noShuffle:true,exp:'④가 틀렸습니다. ESM은 인라인 설치 및 직접 차단을 하지 않습니다. ESM은 다양한 보안 장비의 로그를 수집·통합 분석하는 보안 관제 시스템입니다.'},
// ── 통합 유형 ──
{topic:'sec',type:'mc_hard',fmt:'단원 통합 판단',q:'다음 중 포렌식 분석에서 활용 가능한 정보와 그 출처가 바르게 연결된 것은?',choices:['파일 헤더 시그니처 → 파일 형식 위조 탐지','MAC 주소 → IP 패킷 헤더 분석','TTL 값 → 파일 시스니처 분석','PCB 정보 → 라우팅 테이블 분석'],answer:0,exp:'파일 헤더 시그니처(매직 넘버)를 분석하면 확장자 위조 여부를 탐지할 수 있습니다. 이는 디지털 포렌식의 핵심 기술 중 하나입니다.'},
{topic:'sec',type:'mc_hard',fmt:'계층 통합형',q:'패킷이 인터넷을 통해 목적지까지 전달되는 과정에서 각 계층의 역할을 바르게 연결한 것은?',choices:['2계층(ARP)→MAC주소확인, 3계층(IP)→경로결정, 4계층(TCP/UDP)→신뢰성제어','2계층(IP)→경로결정, 3계층(ARP)→MAC주소확인, 4계층(TCP)→신뢰성제어','2계층(TCP)→신뢰성제어, 3계층(ARP)→경로결정, 4계층(IP)→MAC주소확인','2계층(UDP)→경로결정, 3계층(IP)→신뢰성제어, 4계층(ARP)→MAC주소확인'],answer:0,exp:'2계층=ARP(MAC주소 확인), 3계층=IP 라우팅(경로 결정), 4계층=TCP/UDP(신뢰성·속도 제어) 순서가 올바릅니다.'},
{topic:'sec',type:'mc_hard',fmt:'시나리오 분석',q:'다음 네트워크 침입 시나리오에서 탐지·차단 역할을 하는 장비를 순서대로 나열한 것은?',htmlContent:`<div class="hq-box">공격자가 외부에서 내부망 서버로 SQL 인젝션 공격을 시도하고 있다.<br><br>①장비A는 패킷을 미러링하여 탐지 후 경고를 발생시킨다.<br>②장비B는 인라인으로 악성 패킷을 자동으로 차단한다.<br>③장비C는 모든 보안 장비의 로그를 수집하여 공격 패턴을 분석한다.</div>`,choices:['장비A=IDS, 장비B=IPS, 장비C=ESM','장비A=IPS, 장비B=IDS, 장비C=UTM','장비A=UTM, 장비B=ESM, 장비C=IDS','장비A=ESM, 장비B=UTM, 장비C=IPS'],answer:0,exp:'미러링+경고만=IDS(A), 인라인+자동차단=IPS(B), 로그 수집+분석=ESM(C)입니다.'},
{topic:'sec',type:'mc_hard',fmt:'헤더-프로토콜 연결',q:'IP 헤더의 Protocol 필드 값과 프로토콜이 바르게 연결된 것은?',htmlContent:`<div class="hq-table-wrap"><table class="hq-table"><thead><tr><th>Protocol 필드 값</th><th>프로토콜</th></tr></thead><tbody><tr><td>6</td><td>( ㉠ )</td></tr><tr><td>17</td><td>( ㉡ )</td></tr><tr><td>1</td><td>( ㉢ )</td></tr></tbody></table></div>`,choices:['㉠ TCP — ㉡ UDP — ㉢ ICMP','㉠ UDP — ㉡ TCP — ㉢ ICMP','㉠ ICMP — ㉡ TCP — ㉢ UDP','㉠ TCP — ㉡ ICMP — ㉢ UDP'],answer:0,noShuffle:true,exp:'Protocol 필드: 1=ICMP, 6=TCP, 17=UDP가 대표적인 값입니다.'},
{topic:'sec',type:'mc_hard',fmt:'단답형 심화',q:'다음 중 TCP와 관련된 옳은 설명끼리 묶인 것은?',htmlContent:`<div class="hq-box">ㄱ. 3-way handshake(SYN-SYN/ACK-ACK)로 연결을 설정한다.<br>ㄴ. 데이터 손실 시 재전송 기능이 없다.<br>ㄷ. 수신자의 처리 능력에 맞춰 전송 속도를 조절하는 흐름 제어가 있다.<br>ㄹ. 헤더 크기가 8바이트로 고정이다.<br>ㅁ. 순서 번호(Sequence Number)를 사용하여 패킷 순서를 보장한다.</div>`,choices:['ㄱ, ㄴ, ㄷ, ㄹ, ㅁ 모두','ㄱ, ㄷ, ㅁ','ㄴ, ㄹ, ㅁ','ㄱ, ㄴ, ㄷ'],answer:1,exp:'ㄴ 틀림(TCP는 재전송 기능 있음), ㄹ 틀림(8바이트 고정은 UDP). 옳은 것: ㄱ(3-way handshake), ㄷ(흐름 제어), ㅁ(순서 보장).'},
{topic:'sec',type:'mc_hard',fmt:'포렌식 종합',q:'디지털 포렌식 조사관이 다음 정보를 수집했을 때, 각 정보의 출처 장비/기술이 바르게 연결된 것은?',htmlContent:`<div class="hq-box">A. 용의자 PC에서 실행 중이던 악성 프로세스의 힙 메모리 내용<br>B. 공격자가 내부망에 접속할 때 사용한 IP-MAC 매핑 기록<br>C. 내부 서버로 향한 비정상 트래픽 탐지 경고 로그</div>`,choices:['A-메모리 포렌식(프로세스 덤프), B-ARP 테이블, C-IDS/IPS 로그','A-IP 헤더 분석, B-라우팅 테이블, C-ESM','A-라우팅 테이블, B-파일 시그니처, C-IDS','A-파일 시그니처, B-IP 헤더, C-UTM'],answer:0,exp:'A=프로세스 힙 메모리 덤프, B=ARP 테이블(IP↔MAC 기록), C=IDS/IPS의 침입 탐지 로그에서 각각 수집 가능합니다.'},
];

htmlContent:`<div class="hq-box">프로세스는 하드디스크에 저장된 프로그램이 ( ㄱ )에 올라가 실행될 때 운영체제가 관리하는 실행 단위이다. 운영체제는 각 프로세스를 ( ㄴ )라는 자료구조로 관리하며, 여기에는 프로세스 ID, 상태, 우선순위 등이 저장된다. 프로세스의 메모리 구조에서 동적으로 할당되는 영역은 ( ㄷ )이다.</div>`,

answer:0,noShuffle:true,

{topic:'sec',type:'mc_hard',fmt:'수능형 선지 판단',q:'다음 중 TCP와 UDP에 대한 설명으로 옳은 것만 고른 것은?',

answer:3,noShuffle:true,
exp:'④가 틀렸습니다. Total Length는 IP 헤더만이 아니라 IP 헤더 + 데이터(페이로드)를 포함한 패킷 전체의 크기를 나타냅니다.'},

// ══ 동적 문제 생성 ══
function makeDynSigErrorQ(){
  const SIGS=[
    {ext:'PNG',correct:'89 50 4E 47',wrong:'89 50 4E 46',note:'PNG 시그니처는 89 50 4E 47입니다. 마지막 바이트는 47(G)이며 46이 아닙니다.'},
    {ext:'JPEG',correct:'FF D8 FF E0',wrong:'FF D8 FF E1',note:'JPEG는 FF D8 FF E0 또는 FF D8 FF E1 둘 다 유효합니다. 두 값 모두 정답으로 인정됩니다.',bothOk:true},
    {ext:'PDF',correct:'25 50 44 46',wrong:'25 50 44 47',note:'PDF 시그니처는 25 50 44 46(%PDF)입니다. 마지막 바이트는 46(F)입니다.'},
    {ext:'MP4',correct:'66 74 79 70',wrong:'33 67 70 35',note:'MP4의 ftyp 시그니처는 66 74 79 70입니다.'},
  ];
  const SPEAKERS=['민준','서연','지호','하은'];
  const wrongIdx=Math.floor(Math.random()*SIGS.length);
  const lines=SIGS.map((s,i)=>{
    const isWrong=(i===wrongIdx)&&!s.bothOk;
    return `<strong>${SPEAKERS[i]}:</strong> "${s.ext} 파일의 시그니처는 <span style="font-family:monospace;color:#79c0ff">${isWrong?s.wrong:s.correct}</span>야."`;
  }).join('<br><br>');
  const wrongName=SPEAKERS[wrongIdx];
  const note=SIGS[wrongIdx].note;
  return{
    type:'mc_hard',fmt:'대화 오류 찾기',
    q:'다음 대화에서 파일 시그니처를 잘못 말한 학생은?',
    htmlContent:`<div class="hq-box"><strong>주제: 파일 시그니처</strong><br><br>${lines}</div>`,
    choices:SPEAKERS,answer:wrongIdx,noShuffle:true,
    exp:`${wrongName}이(가) 틀렸습니다. ${note}`
  };
}

function makeDynIPFlagQ(){
  const FLAGS=[
    {bit:'0번 비트',name:'RSV (Reserved)',correct:'사용되지 않음, 항상 0으로 설정',wrong:'조각화 금지를 나타내며 1이면 단편화 불가',note:'0번 비트(RSV)는 예약 비트로 항상 0입니다. 조각화 금지는 1번 비트(DF)입니다.'},
    {bit:'1번 비트',name:'DF (Don\'t Fragment)',correct:'조각화 금지. 1이면 단편화 불가, MTU 초과 시 전송 실패',wrong:'추가 단편이 뒤따름을 표시, 마지막 단편은 0',note:'1번 비트(DF)는 조각화 금지 플래그입니다. 추가 단편 표시는 2번 비트(MF)입니다.'},
    {bit:'2번 비트',name:'MF (More Fragments)',correct:'더 많은 조각이 뒤따름. 마지막 조각은 0으로 설정',wrong:'사용되지 않음, 항상 0으로 설정',note:'2번 비트(MF)는 추가 단편 존재 여부를 표시합니다. 마지막 단편에서는 0입니다.'},
  ];
  const wrongIdx=Math.floor(Math.random()*FLAGS.length);
  const rows=FLAGS.map((f,i)=>{
    const isWrong=(i===wrongIdx);
    return `<tr><td>${f.bit}</td><td>${f.name}</td><td>${isWrong?f.wrong:f.correct}</td></tr>`;
  }).join('');
  return{
    type:'mc_hard',fmt:'표 오류 찾기',
    q:'다음 IP 패킷 헤더 Flags 필드 설명에서 옳지 않은 항목은?',
    htmlContent:`<div class="hq-table-wrap"><table class="hq-table"><thead><tr><th>비트 위치</th><th>이름</th><th>설명</th></tr></thead><tbody>${rows}</tbody></table></div>`,
    choices:FLAGS.map(f=>f.bit),answer:wrongIdx,noShuffle:true,
    exp:`${FLAGS[wrongIdx].bit}(${FLAGS[wrongIdx].name})의 설명이 틀렸습니다. ${FLAGS[wrongIdx].note}`
  };
}

function getHardQuestions(){return shuffle([...HARD_QUESTIONS_STATIC,makeDynSigErrorQ(),makeDynIPFlagQ()]);}
function getExpertQuestions(){return shuffle([...EXPERT_QUESTIONS_STATIC]);}

// ══ 상태 ══
let selectedQuestions=[],currentIdx=0,score=0,answered=false,currentMode='normal';


function selectTopic(topic){
  selectedTopic=topic;

  document.querySelectorAll('.topic-btn').forEach(btn=>{
    btn.classList.remove('selected-topic');
  });

  const target=document.getElementById('btn-topic-'+topic);
  if(target) target.classList.add('selected-topic');

  updateQuestionCount();
}

function updateQuestionCount(){
  let pool;

  if(currentMode==='normal') pool=[...NORMAL_QUESTIONS];
  else if(currentMode==='hard') pool=[...HARD_QUESTIONS_STATIC];
  else pool=[...EXPERT_QUESTIONS_STATIC];

  if(selectedTopic!=='all'){
    pool=pool.filter(q=>q.topic===selectedTopic);
  }

  document.getElementById('info-qcount').textContent=pool.length;
}

function selectDiff(mode){
  currentMode=mode;
  ['normal','hard','expert'].forEach(m=>{
    document.getElementById('btn-diff-'+m).className='diff-btn'+(m===mode?' selected-'+m:'');
  });
  const btn=document.getElementById('btn-start-main');
  const labels={normal:'🚀 문제 시작하기 →',hard:'🔥 하드 시작하기 →',expert:'⚡ 익스퍼트 시작하기 →'};
  const cls={normal:'btn-start',hard:'btn-start hard-mode',expert:'btn-start expert-mode'};
  btn.textContent=labels[mode];btn.className=cls[mode];updateQuestionCount();
}

function startQuiz(forcedMode){
  if(forcedMode)selectDiff(forcedMode);

  let pool;

  if(currentMode==='normal') pool=[...NORMAL_QUESTIONS];
  else if(currentMode==='hard') pool=getHardQuestions();
  else pool=getExpertQuestions();

  if(selectedTopic!=='all'){
    pool=pool.filter(q=>q.topic===selectedTopic);
  }

  pool=shuffle(pool).slice(0,20);
  selectedQuestions=pool;currentIdx=0;score=0;
  document.getElementById('start-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('live-score').textContent=0;
  const fill=document.getElementById('progress-fill');
  fill.className='progress-bar-fill'+(currentMode==='hard'?' hard-fill':currentMode==='expert'?' expert-fill':'');
  document.getElementById('quiz-screen').className=currentMode==='hard'?'hard-mode-active':currentMode==='expert'?'expert-mode-active':'';
  renderQuestion();
}

function renderQuestion(){
  answered=false;
  const q=selectedQuestions[currentIdx];
  const total=selectedQuestions.length;
  document.getElementById('cur-q').textContent=currentIdx+1;
  document.getElementById('progress-fill').style.width=((currentIdx+1)/total*100)+'%';
  document.getElementById('explanation').style.display='none';
  document.getElementById('btn-next').style.display='none';
  const qCard=document.getElementById('q-card');
  const qType=document.getElementById('q-type');
  const qText=document.getElementById('q-text');
  const qHtml=document.getElementById('q-html-content');
  const btnNext=document.getElementById('btn-next');
  qCard.className='question-card'+(currentMode==='hard'?' hard-card':currentMode==='expert'?' expert-card':'');
  btnNext.className='btn-next'+(currentMode==='hard'?' hard-next':currentMode==='expert'?' expert-next':'');
  if(q.type==='mc')qType.innerHTML='✏️ 객관식';
  else if(q.type==='sa')qType.innerHTML='📝 단답형';
  else if(currentMode==='expert')qType.innerHTML=`⚡ <span class="expert-badge-inline">EXPERT</span> &nbsp;<span class="fmt-tag">${q.fmt}</span>`;
  else qType.innerHTML=`🔥 <span class="hard-badge-inline">HARD</span> &nbsp;<span class="fmt-tag">${q.fmt}</span>`;
  qText.textContent=q.q;
  qHtml.innerHTML=q.htmlContent||'';
  const area=document.getElementById('choices-area');
  area.innerHTML='';
  if(q.type==='mc'||q.type==='mc_hard'){
    const{shuffledChoices,newAnswerIdx}=pickMC(q.choices,q.answer,q.noShuffle||false);
    const labels=shuffledChoices.length>=5?LABELS5:LABELS4;
    const div=document.createElement('div');div.className='choices';
    shuffledChoices.forEach((choiceText,i)=>{
      const btn=document.createElement('button');btn.className='choice-btn';
      btn.innerHTML=`<span class="choice-num">${labels[i]}</span><span>${choiceText}</span>`;
      btn.onclick=()=>handleMC(i,btn,div,newAnswerIdx,q);
      div.appendChild(btn);
    });
    area.appendChild(div);
  }else{
    const wrap=document.createElement('div');wrap.className='short-answer-wrap';
    const row=document.createElement('div');row.className='short-input-row';
    const inp=document.createElement('input');inp.className='short-input';inp.type='text';inp.placeholder='정답을 입력하세요';
    const submitBtn=document.createElement('button');submitBtn.className='btn-submit';submitBtn.textContent='제출';
    const hint=document.createElement('div');hint.className='sa-hint';
    const doSubmit=()=>submitSA(inp,submitBtn,hint,q);
    inp.onkeydown=e=>{if(e.key==='Enter')doSubmit();};submitBtn.onclick=doSubmit;
    row.appendChild(inp);row.appendChild(submitBtn);wrap.appendChild(row);wrap.appendChild(hint);area.appendChild(wrap);
    setTimeout(()=>inp.focus(),100);
  }
}

function handleMC(idx,btn,div,correctIdx,q){
  if(answered)return;answered=true;
  const btns=div.querySelectorAll('.choice-btn');btns.forEach(b=>b.disabled=true);
  const isCorrect=idx===correctIdx;
  btns[correctIdx].classList.add('correct');
  if(!isCorrect)btn.classList.add('wrong');
  if(isCorrect)score++;
  document.getElementById('live-score').textContent=score;
  showExp(q.exp);
}

function submitSA(inp,submitBtn,hint,q){
  if(answered)return;const val=inp.value.trim();if(!val)return;
  answered=true;inp.disabled=true;submitBtn.disabled=true;
  const isCorrect=checkSA(val,q.answers);
  if(isCorrect){inp.classList.add('correct');hint.className='sa-hint correct-hint';hint.textContent='✅ 정답입니다!';score++;}
  else{inp.classList.add('wrong');hint.className='sa-hint wrong-hint';hint.textContent=`❌ 오답 — 정답: ${q.answers[0]}`;}
  document.getElementById('live-score').textContent=score;showExp(q.exp);
}

function showExp(text){
  const el=document.getElementById('explanation');
  document.getElementById('exp-text').textContent=text;el.style.display='block';
  const nextBtn=document.getElementById('btn-next');nextBtn.style.display='block';
  nextBtn.textContent=currentIdx<selectedQuestions.length-1?'다음 문제 →':'결과 보기 🏁';
  nextBtn.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function nextQuestion(){
  currentIdx++;
  if(currentIdx>=selectedQuestions.length)showResult();
  else{renderQuestion();window.scrollTo({top:0,behavior:'smooth'});}
}

function showResult(){
  document.getElementById('quiz-screen').style.display='none';
  const rs=document.getElementById('result-screen');rs.style.display='flex';
  const total=selectedQuestions.length;const pct=Math.round(score/total*100);
  document.getElementById('result-score-num').textContent=score;
  const sn=document.getElementById('result-score-num');
  sn.className='score-num'+(currentMode==='hard'?' hard-score':currentMode==='expert'?' expert-score':'');
  document.getElementById('cnt-correct').textContent=score;
  document.getElementById('cnt-wrong').textContent=total-score;
  const db=document.getElementById('result-diff-badge');
  const labels={normal:'📖 노말 모드',hard:'🔥 하드 모드',expert:'⚡ 익스퍼트 모드'};
  db.className='result-diff-badge '+currentMode;db.textContent=labels[currentMode];
  setTimeout(()=>{
    document.getElementById('bar-correct').style.width=(score/total*100)+'%';
    document.getElementById('bar-wrong').style.width=((total-score)/total*100)+'%';
  },200);
  let emoji,title,detail;
  if(pct>=90){emoji='🏆';title='완벽해요!';detail=`${total}문제 중 ${score}문제 정답 (${pct}%)\n디지털 포렌식 & 네트워크 완전 정복!`;}
  else if(pct>=70){emoji='😊';title='잘했어요!';detail=`${total}문제 중 ${score}문제 정답 (${pct}%)\n조금만 더 보강하면 만점!`;}
  else if(pct>=50){emoji='📖';title='더 공부해요!';detail=`${total}문제 중 ${score}문제 정답 (${pct}%)\n오답 노트를 꼭 만들어보세요.`;}
  else{emoji='💪';title='다시 도전!';detail=`${total}문제 중 ${score}문제 정답 (${pct}%)\n핵심 개념을 다시 복습해요.`;}
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-detail').textContent=detail;
}


function restartSameTopic(mode){
  startQuiz(mode);
}

function goHome(){
  document.getElementById('result-screen').style.display='none';
  document.getElementById('start-screen').style.display='flex';
}

selectDiff('normal');
updateQuestionCount();
</script>
